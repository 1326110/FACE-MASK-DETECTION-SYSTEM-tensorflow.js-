<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Mask Detection AI</title>
    <meta name="description" content="Real-time multi-face mask detection using MobileNetV2 and deep learning.">
    <!-- Updated CSS path since we aren't using Flask -->
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Load TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <!-- Load BlazeFace -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div class="container">
        <header class="header">
            <h1 class="gradient-text">Real-Time Face Mask AI</h1>
            <p class="subtitle">Powered by WebGL, BlazeFace & MobileNetV2</p>
        </header>

        <main class="glass-panel">
            <div class="video-wrapper" style="position: relative;">
                <span class="status-indicator">
                    <span class="pulse"></span> Live Stream
                </span>
                <video id="video-stream" class="video-stream" autoplay playsinline muted></video>
                <canvas id="overlay-canvas" style="position: absolute; top:0; left:0; width: 100%; height: 100%; pointer-events:none;"></canvas>
            </div>
            
            <div class="info-section">
                <h2>Detection Legend</h2>
                <div class="legend">
                    <div class="legend-item">
                        <span class="color-box mask-on"></span>
                        <span>Correctly Masked</span>
                    </div>
                    <div class="legend-item">
                        <span class="color-box mask-incorrect"></span>
                        <span>Incorrectly Masked</span>
                    </div>
                    <div class="legend-item">
                        <span class="color-box mask-off"></span>
                        <span>No Mask</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Developed with ❤️ for Safety</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
